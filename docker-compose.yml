services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wertxrust}
      POSTGRES_USER: ${POSTGRES_USER:-wertxrust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wertxrust_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: db
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
volumes:
  postgres_data:
  static_volume:
  media_volume:
