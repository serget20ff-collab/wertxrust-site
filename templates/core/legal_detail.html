{% extends 'base.html' %}

{% block title %}{{ doc.name }} — WertxRust{% endblock %}

{% block content %}
<section class="page-wrap">
    <div class="section-kicker">ДОКУМЕНТ</div>

    <h1>{{ doc.title }}</h1>

    <article class="document-body">
        {{ doc.text|linebreaks }}
    </article>

    <div class="document-actions">
        <a class="main-button dark" href="{% url 'core:legal_index' %}">
            Назад к документам
        </a>
    </div>
</section>
{% endblock %}
