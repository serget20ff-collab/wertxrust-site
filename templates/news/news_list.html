{% extends 'base.html' %}{% block title %}Новости — WertxRust{% endblock %}{% block content %}<section class="page-wrap"><h1>Новости</h1><div class="cards-list">{% for post in posts %}<a class="wide-card" href="{% url 'news:news_detail' post.slug %}"><span class="tag">{{ post.get_post_type_display }}</span><h2>{{ post.title }}</h2><p>{{ post.excerpt }}</p></a>{% empty %}<div class="glass-card"><h2>Новостей пока нет</h2><p>Добавь первую новость через админку.</p></div>{% endfor %}</div></section>{% endblock %}
