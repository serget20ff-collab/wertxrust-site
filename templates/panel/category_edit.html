{% extends 'base.html' %}

{% block title %}Изменить категорию — Администрирование{% endblock %}

{% block content %}
<section class="panel-page">
    <div class="panel-hero compact-title">
        <div>
            <div class="section-kicker">SHOP CONTROL</div>
            <h1>Изменить категорию</h1>
            <p>{{ category.name }}</p>
        </div>

        <a class="main-button dark" href="{% url 'panel:shop' %}">Назад</a>
    </div>

    <form class="panel-form-card single" method="post">
        {% csrf_token %}

        <div class="panel-form-grid">
            {{ form.as_p }}
        </div>

        <button class="main-button primary" type="submit">Сохранить категорию</button>
    </form>
</section>
{% endblock %}
